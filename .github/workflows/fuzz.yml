name: Fuzz campaign

# This workflow RUNS the fuzz targets on a schedule (each for a bounded time) and
# uploads the evolved corpus and any crash artifact for inspection. Compilation of
# the targets is a fast per-PR check in the fuzz-check job below.
on:
  schedule:
    - cron: "0 3 * * 1" # weekly, Monday 03:00 UTC
  workflow_dispatch:
    inputs:
      minutes:
        description: Minutes to fuzz each target
        default: "10"

permissions:
  contents: read

jobs:
  fuzz-check:
    name: Fuzz targets compile (nightly)
    runs-on: ubuntu-latest
    # cargo-fuzz builds with the host nightly; warnings in its own deps must not
    # fail the install, so this job does not deny warnings.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo install cargo-fuzz
      - run: cargo +nightly fuzz check

  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [hive_carve, recover_deleted]
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo install cargo-fuzz
      - name: Fuzz ${{ matrix.target }}
        run: |
          minutes="${{ github.event.inputs.minutes || '10' }}"
          cargo +nightly fuzz run "${{ matrix.target }}" -- -max_total_time="$((minutes * 60))"
      - name: Upload corpus and any crash artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-${{ matrix.target }}
          path: |
            fuzz/corpus/${{ matrix.target }}
            fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
