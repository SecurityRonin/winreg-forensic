name: Release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: write

jobs:
  build:
    # Windows Authenticode signing (SOP §5): environment: release scopes the OIDC
    # subject to repo:SecurityRonin/winreg-forensic:environment:release; id-token:
    # write lets azure/login mint the token exchanged for the signing session.
    environment: release
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # Must match rust-toolchain.toml's pin: that file overrides the
          # toolchain cargo uses, so the cross-target has to be installed onto
          # the pinned version, not the action's default `stable` (else E0463).
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --package winreg-cli --bin reg4n6

      # Windows Authenticode signing (Azure Trusted Signing, SOP §5). OIDC login
      # FIRST; sign the .exe BEFORE cargo-wix packages it.
      - name: Azure login (OIDC)
        if: runner.os == 'Windows'
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign Windows .exe (Azure Trusted Signing)
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@208f8af4bf26cf2af8597424e3cb5582801523ba # v2.0.0
        with:
          endpoint: https://neu.codesigning.azure.net
          trusted-signing-account-name: securityronin
          certificate-profile-name: securityronin-public
          files-folder: target/${{ matrix.target }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../reg4n6-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz reg4n6
          cd ../../..

      - name: Install cargo-wix (Windows)
        if: runner.os == 'Windows'
        run: cargo install cargo-wix --version 0.3.9 --locked

      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        run: cargo wix --no-build --package winreg-cli --target ${{ matrix.target }} --output reg4n6-${{ steps.version.outputs.version }}-${{ matrix.target }}.msi

      # Sign the MSI too, so winget/UAC shows the verified publisher on install.
      - name: Sign Windows .msi (Azure Trusted Signing)
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@208f8af4bf26cf2af8597424e3cb5582801523ba # v2.0.0
        with:
          endpoint: https://neu.codesigning.azure.net
          trusted-signing-account-name: securityronin
          certificate-profile-name: securityronin-public
          files-folder: ${{ github.workspace }}
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: reg4n6-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: reg4n6-${{ steps.version.outputs.version }}-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: 'reg4n6-*-*-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            artifacts/reg4n6-*
            artifacts/checksums.txt
          generate_release_notes: true
